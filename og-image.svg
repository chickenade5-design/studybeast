<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0b1a"/>
      <stop offset="100%" style="stop-color:#1a0d2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(124,58,237,0.06)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Glow orbs -->
  <circle cx="200" cy="150" r="200" fill="#7c3aed" opacity="0.08" filter="blur(80px)"/>
  <circle cx="1000" cy="480" r="180" fill="#06b6d4" opacity="0.08" filter="blur(80px)"/>
  <!-- Logo -->
  <text x="600" y="200" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="96" font-weight="900" fill="url(#accent)">StudyBeast</text>
  <!-- Emoji icons -->
  <text x="250" y="360" font-size="48" text-anchor="middle">📚</text>
  <text x="400" y="360" font-size="48" text-anchor="middle">⏱️</text>
  <text x="550" y="360" font-size="48" text-anchor="middle">🧠</text>
  <text x="700" y="360" font-size="48" text-anchor="middle">✅</text>
  <text x="850" y="360" font-size="48" text-anchor="middle">🐾</text>
  <text x="1000" y="360" font-size="48" text-anchor="middle">🎯</text>
  <!-- Tagline -->
  <text x="600" y="450" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="32" fill="#e2e8f0" font-weight="600">Free Study Tools for Students</text>
  <!-- Features -->
  <text x="600" y="510" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="22" fill="#64748b">Flashcards · Pomodoro · Quizzes · Study Rooms · Habits · Pet</text>
  <!-- CTA -->
  <rect x="440" y="545" width="320" height="50" rx="25" fill="url(#accent)"/>
  <text x="600" y="578" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="20" fill="#ffffff" font-weight="700">Start Studying — 100% Free</text>
</svg>